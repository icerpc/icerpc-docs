name: 'Lint Markdown Files'

on:
  pull_request:
    branches: [csharp-0.6-dev]

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: articulate/actions-markdownlint@v1
        with:
          config: .markdownlint.json
          files: 'content/**/*.md'
          ignore: node_modules
