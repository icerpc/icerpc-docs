name: Node.js CI

on:
  pull_request:
    branches: [csharp-0.6-dev]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build --omit=dev
